name: TypeOff
options:
  bundleIdPrefix: com.typeoff
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "2TWV639R43"
    CODE_SIGN_STYLE: Automatic

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit.git
    from: "0.9.0"

targets:
  Typeoff:
    type: application
    platform: iOS
    sources:
      - path: Typeoff/Sources/App
      - path: Typeoff/Sources/Engine
      - path: Typeoff/Sources/Store
      - path: Typeoff/Resources/WhisperKitModels
        type: folder
        buildPhase: resources
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Typeoff/Info.plist
        PRODUCT_NAME: TypeOff
        PRODUCT_BUNDLE_IDENTIFIER: com.chenbao.typeoff
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
    dependencies:
      - package: WhisperKit
        product: WhisperKit
    entitlements:
      path: Typeoff/Typeoff.entitlements
    preBuildScripts: []
    scheme:
      testTargets:
        - TypeoffTests

  TypeoffKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - path: Typeoff/Sources/Keyboard
      - path: Typeoff/Sources/Store/TrialManager.swift
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Typeoff/Sources/Keyboard/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.chenbao.typeoff.keyboard
    entitlements:
      path: Typeoff/TypeoffKeyboard.entitlements

  TypeoffTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Typeoff/Tests/Engine
    info:
      path: Typeoff/Tests/Info.plist
    dependencies:
      - target: Typeoff
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chenbao.typeoff.tests
        GENERATE_INFOPLIST_FILE: NO
