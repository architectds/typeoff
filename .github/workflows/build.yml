name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac-apple-silicon:
    runs-on: macos-latest  # Apple Silicon
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install tauri-cli
      - name: Build
        working-directory: rs
        run: cargo tauri build
      - uses: actions/upload-artifact@v4
        with:
          name: Typeoff-Mac-AppleSilicon
          path: rs/target/release/bundle/dmg/*.dmg

  build-mac-intel:
    runs-on: macos-13  # Intel Mac runner (last Intel runner available)
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install tauri-cli
      - name: Build
        working-directory: rs
        run: cargo tauri build
      - uses: actions/upload-artifact@v4
        with:
          name: Typeoff-Mac-Intel
          path: rs/target/release/bundle/dmg/*.dmg

  build-windows-cpu:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install tauri-cli
      - name: Build (CPU only)
        working-directory: rs
        run: cargo tauri build
      - uses: actions/upload-artifact@v4
        with:
          name: Typeoff-Win-CPU
          path: |
            rs/target/release/bundle/nsis/*.exe
            rs/target/release/bundle/msi/*.msi

  build-windows-gpu:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.22
        with:
          cuda: '12.4.0'
          method: 'network'
      - run: cargo install tauri-cli
      - name: Build (CUDA GPU)
        working-directory: rs
        run: cargo tauri build --features cuda
      - uses: actions/upload-artifact@v4
        with:
          name: Typeoff-Win-GPU
          path: |
            rs/target/release/bundle/nsis/*.exe
            rs/target/release/bundle/msi/*.msi

  release:
    needs: [build-mac-apple-silicon, build-mac-intel, build-windows-cpu, build-windows-gpu]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Typeoff-Mac-AppleSilicon/*.dmg
            Typeoff-Mac-Intel/*.dmg
            Typeoff-Win-CPU/*.exe
            Typeoff-Win-CPU/*.msi
            Typeoff-Win-GPU/*.exe
            Typeoff-Win-GPU/*.msi
          generate_release_notes: true
